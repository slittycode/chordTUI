name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Bun and Python checks (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck TypeScript
        run: bun run typecheck

      - name: Run Bun tests
        run: bun test

      - name: Sync Python engine dependencies
        run: uv sync --project engine --locked

      - name: Run Python tests
        run: uv run --project engine pytest

      - name: Lint Python engine and tests
        run: uv run --project engine ruff check engine tests/py
